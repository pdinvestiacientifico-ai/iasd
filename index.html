<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactiva Infantil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(to bottom, #bae6fd, #e0f2fe);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: all 0.8s ease;
            position: relative;
            cursor: pointer; /* Indica que se puede hacer clic */
        }

        /* Pantalla de inicio para forzar la activación */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 105, 161, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            transition: opacity 0.5s ease;
        }
        #start-button {
            padding: 20px 40px;
            font-size: 2rem;
            background: #fde047;
            color: #0369a1;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Nubes mágicas */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 100px;
            animation: float-clouds 20s infinite linear;
            z-index: 1;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
        }
        .c1 { width: 150px; height: 60px; top: 10%; left: -150px; animation-duration: 25s; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .c1::after { width: 90px; height: 90px; top: -45px; left: 60px; }

        .c2 { width: 200px; height: 70px; top: 70%; left: -200px; animation-duration: 32s; animation-delay: 5s; }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 30px; }
        .c2::after { width: 110px; height: 110px; top: -55px; left: 75px; }

        @keyframes float-clouds {
            0% { left: -250px; }
            100% { left: 105vw; }
        }

        #guide {
            position: absolute;
            top: 20px;
            font-size: 1.2rem;
            color: #475569;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 24px;
            border-radius: 50px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            font-weight: bold;
            z-index: 10;
        }
        #guide span { font-weight: 900; color: #0284c7; }

        /* ESCENARIO DE LOS NIÑOS */
        .stage {
            display: flex;
            gap: 60px;
            align-items: center;
            justify-content: center;
            z-index: 5;
            height: 340px;
        }

        .child {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #fbcfe8;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset -8px -8px 16px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: gentle-float 4s ease-in-out infinite;
        }
        
        .girl { animation-delay: 0.5s; background: #fed7aa; } 

        /* CABELLO NIÑO */
        .boy .hair {
            position: absolute;
            top: -12px;
            width: 230px;
            height: 85px;
            background: #7c2d12;
            border-radius: 120px 120px 20px 20px;
        }
        .boy .hair-fringe {
            position: absolute;
            top: 60px;
            left: 30px;
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 25px solid #7c2d12;
            filter: drop-shadow(40px 0 0 #7c2d12) drop-shadow(80px 0 0 #7c2d12);
        }

        /* CABELLO NIÑA (Largo, Lacio, Recogido con Gancho/Colet) */
        .girl .hair-back {
            position: absolute;
            top: 30px;
            width: 230px;
            height: 200px;
            background: #1e293b;
            border-radius: 40px 40px 20px 20px;
            z-index: 2;
        }
        .girl .hair-top {
            position: absolute;
            top: -12px;
            width: 224px;
            height: 80px;
            background: #1e293b;
            border-radius: 120px 120px 0 0;
            z-index: 4;
        }
        /* Gancho / Colet Rosa brillante */
        .girl .colet {
            position: absolute;
            top: -25px;
            left: 95px;
            width: 35px;
            height: 20px;
            background: #f43f5e;
            border-radius: 5px;
            z-index: 5;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .girl .colet::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px;
            width: 55px; height: 20px;
            background: #f43f5e;
            border-radius: 50%;
        }

        /* OJOS GRANDES */
        .eyes-container {
            display: flex;
            gap: 40px;
            margin-top: 45px;
            margin-bottom: 15px;
            z-index: 6;
        }
        .eye {
            width: 40px;
            height: 40px;
            background: #0f172a;
            border-radius: 50%;
            position: relative;
            transition: all 0.5s ease;
        }
        .eye::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 7px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
        }

        /* BOCA */
        .mouth {
            width: 70px;
            height: 35px;
            background: #451a03;
            border-radius: 0 0 70px 70px;
            transition: all 0.5s ease;
            z-index: 6;
        }

        /* LÁGRIMAS */
        .teardrop-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 7;
            display: none;
        }
        .teardrop {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #38bdf8;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            animation: drop-fall 1s infinite linear;
        }
        .t1 { left: 55px; top: 125px; }
        .t2 { right: 55px; top: 125px; animation-delay: 0.4s; }

        /* EFECTO Zzz */
        .zzz {
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 2.5rem;
            font-weight: bold;
            color: #818cf8;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 8;
        }

        /* TEXTO BANNER GIGANTE */
        #text-banner {
            margin-top: 40px;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            color: #0369a1;
            text-shadow: 4px 4px 0px #ffffff;
            z-index: 5;
            transition: all 0.5s ease;
        }

        /* ================= CAMBIOS DE ESTADO ================= */

        /* [S] MODO DORMIR */
        body.sleep-mode { background: linear-gradient(to bottom, #1e1b4b, #312e81); }
        body.sleep-mode .child { animation: slow-breath 4s infinite ease-in-out; }
        body.sleep-mode .eye { height: 8px; border-radius: 0 0 40px 40px; background: #451a03; }
        body.sleep-mode .eye::after { opacity: 0; }
        body.sleep-mode .mouth { width: 25px; height: 15px; border-radius: 50%; background: #451a03; }
        body.sleep-mode .zzz { opacity: 1; animation: zzz-float 2s infinite ease-in-out; }
        body.sleep-mode .girl .zzz { animation-delay: 0.7s; }

        /* [B] MODO LLORAR */
        body.sad-mode { background: linear-gradient(to bottom, #475569, #334155); }
        body.sad-mode .child { animation: shiver 0.15s infinite; }
        body.sad-mode .eye { height: 12px; border-radius: 40px 40px 0 0; background: #1e293b; }
        body.sad-mode .eye::after { opacity: 0; }
        body.sad-mode .mouth { width: 60px; height: 25px; border-radius: 60px 60px 0 0; background: #1e293b; transform: translateY(8px); }
        body.sad-mode .teardrop-container { display: block; }

        /* [A] MODO FELIZ */
        body.happy-mode { background: linear-gradient(to bottom, #f0fdf4, #bbf7d0); }
        body.happy-mode .child { animation: jump-victory 0.5s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.happy-mode .girl { animation-delay: 0.15s; }
        body.happy-mode .eye { transform: scale(1.1); }
        body.happy-mode .mouth { width: 80px; height: 45px; border-radius: 0 0 80px 80px; }

        /* ================= ANIMACIONES ================= */
        @keyframes gentle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes slow-breath {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.97) translateY(4px); }
        }
        @keyframes shiver {
            0% { transform: translate(1px, 1px); }
            100% { transform: translate(-1px, -1px); }
        }
        @keyframes jump-victory {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }
        @keyframes zzz-float {
            0% { transform: translate(0,0) scale(0.6); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(30px, -50px) scale(1.2); opacity: 0; }
        }
        @keyframes drop-fall {
            0% { transform: translateY(0) rotate(45deg) scale(0.4); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateY(110px) rotate(45deg) scale(1.1); opacity: 0; }
        }

        /* Controles inferiores de respaldo visibles y grandes */
        .controls { position: absolute; bottom: 30px; display: flex; gap: 20px; z-index: 20; }
        .controls button { 
            padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 25px; 
            font-weight: bold; cursor: pointer; background: white; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .controls button:active { transform: scale(0.95); }
        #btn-s { color: #4f46e5; }
        #btn-b { color: #dc2626; }
        #btn-a { color: #16a34a; }
    </style>
</head>
<body>

    <!-- Pantalla de desbloqueo obligatorio (Soluciona el fallo de audio y foco) -->
    <div id="start-overlay" onclick="startStory()">
        <h1 style="margin-bottom: 20px; font-size: 2.5rem; text-align: center;">Historia Interactiva Infantil</h1>
        <button id="start-button">¡Haga Clic para Empezar!</button>
        <p style="margin-top: 15px; font-size: 1.1rem; opacity: 0.8;">Esto activa las teclas y los sonidos</p>
    </div>

    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div id="guide">Teclas del Teclado: [S] Dormir | [B] Llorar | [A] ¡Despertar!</div>

    <div class="stage">
        <!-- AVATAR NIÑO -->
        <div class="child boy">
            <div class="hair"><div class="hair-fringe"></div></div>
            <div class="eyes-container">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="teardrop-container">
                <div class="teardrop t1"></div>
                <div class="teardrop t2"></div>
            </div>
        </div>

        <!-- AVATAR NIÑA (Cabello Lacio con Colet/Gancho) -->
        <div class="child girl">
            <div class="colet"></div>
            <div class="hair-top"></div>
            <div class="hair-back"></div>
            <div class="eyes-container">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
            <div class="mouth"></div>
            <div class="zzz">Zzz</div>
            <div class="teardrop-container">
                <div class="teardrop t1"></div>
                <div class="teardrop t2"></div>
            </div>
        </div>
    </div>

    <div id="text-banner">¡BIENVENIDOS!</div>

    <!-- Botones físicos grandes en pantalla por si el teclado falla en el proyector -->
    <div class="controls">
        <button id="btn-s" onclick="triggerSleep(); event.stopPropagation();">Tecla [S] Dormir</button>
        <button id="btn-b" onclick="triggerSad(); event.stopPropagation();">Tecla [B] Triste</button>
        <button id="btn-a" onclick="triggerHappy(); event.stopPropagation();">Tecla [A] Alegre</button>
    </div>

    <script>
        const body = document.body;
        const banner = document.getElementById('text-banner');
        let audioReady = false;

        // Desbloquear audio e interfaz
        function startStory() {
            document.getElementById('start-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay').style.display = 'none';
            }, 500);
            audioReady = true;
            window.focus(); // Obliga al navegador a escuchar el teclado
            playSound("¡Bienvenidos amiguitos!");
        }

        // Motor de sonido corregido
        function playSound(text) {
            if (!audioReady) return;
            window.speechSynthesis.cancel(); // Detener cualquier sonido anterior
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX'; 
            utterance.rate = 1.3;     
            utterance.pitch = 1.6;    
            window.speechSynthesis.speak(utterance);
        }

        function triggerSleep() {
            body.className = 'sleep-mode';
            banner.textContent = "SHHH... ¡A DORMIR!";
            banner.style.color = "#a5b4fc";
            banner.style.textShadow = "4px 4px 0px #1e1b4b";
            playSound("Shhh... zzz... Shhh... zzz...");
        }

        function triggerSad() {
            body.className = 'sad-mode';
            banner.textContent = "MUY, MUY TRISTE...";
            banner.style.color = "#cbd5e1";
            banner.style.textShadow = "4px 4px 0px #1e293b";
            playSound("¡Buaaaa, buaaaa! ¡Qué triste, buaaaa!");
        }

        function triggerHappy() {
            body.className = 'happy-mode';
            banner.textContent = "¡JESÚS LOS DESPERTÓ!";
            banner.style.color = "#15803d";
            banner.style.textShadow = "4px 4px 0px #ffffff";
            playSound("¡Sííí! ¡Jajaja! ¡Qué felicidad! ¡Despertaron!");
        }

        // Eventos del Teclado Globales (Asegurados)
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 's') triggerSleep();
            if (key === 'b') triggerSad();
            if (key === 'a') triggerHappy();
        });
    </script>
</body>
</html>
