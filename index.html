<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Interactiva - Jesús sana al joven</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        #instructions {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .key-badge {
            background: #ffde59;
            color: black;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        #display-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
        }
        .emoji {
            font-size: 35vh; /* Ocupa gran parte de la pantalla */
            animation: bounce 2s infinite alternate;
        }
        .text-guide {
            font-size: 3.5rem;
            font-weight: bold;
            margin-top: 20px;
            padding: 0 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        /* Animación suave para las caritas */
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <!-- Instrucciones ocultables para el narrador -->
    <div id="instructions">
        Controles: <span class="key-badge">A</span> Carita Feliz | <span class="key-badge">B</span> Carita Triste | <span class="key-badge">S</span> Modo Dormir/Inicio
    </div>

    <div id="display-container">
        <div id="emoji-target" class="emoji">😴</div>
        <div id="text-target" class="text-guide">¡Shhh... a dormir!</div>
    </div>

    <script>
        const body = document.body;
        const emojiTarget = document.getElementById('emoji-target');
        const textTarget = document.getElementById('text-target');

        // Escuchar las teclas presionadas
        document.addEventListener('keydown', function(event) {
            const key = event.key.toUpperCase();

            if (key === 'A') {
                // Configuración Carita Feliz (Clímax y Alegría)
                body.style.backgroundColor = "#461b93"; // Fondo Morado alegre / festivo
                emojiTarget.textContent = "😊";
                textTarget.textContent = "¡QUÉ FELICIDAD!";
                textTarget.style.color = "#ffde59";
            } 
            else if (key === 'B') {
                // Configuración Carita Triste (La mamá llorando)
                body.style.backgroundColor = "#222831"; // Fondo oscuro/grisáceo
                emojiTarget.textContent = "😢";
                textTarget.textContent = "Muy, muy triste...";
                textTarget.style.color = "#3a97ff";
            } 
            else if (key === 'S') {
                // Configuración Inicial / Dormir (Introducción y Repaso)
                body.style.backgroundColor = "#1a1a2e"; // Fondo noche
                emojiTarget.textContent = "😴";
                textTarget.textContent = "Es solo un sueño...";
                textTarget.style.color = "#ffffff";
            }
        });
    </script>
</body>
</html>
